name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Determines the version to release from the top `## X.Y.Z` heading in
  # CHANGELOG.md, and whether a GitHub release for it already exists. The
  # `publish` job only runs when it doesn't — this makes pushes to `main` that
  # don't add a new CHANGELOG heading a no-op, and makes re-runs idempotent.
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      exists: ${{ steps.check.outputs.exists }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version from CHANGELOG.md
        id: version
        run: |
          version=$(grep -m1 -oE '^## [0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | sed -E 's/^## //')
          if [ -z "$version" ]; then
            echo "No '## X.Y.Z' heading found at the top of CHANGELOG.md" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.version.outputs.version }} already exists — nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      SKIP_SIMPLE_GIT_HOOKS: 1
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Set package version from CHANGELOG
        working-directory: packages/devtooie
        run: npm version "$VERSION" --no-git-tag-version

      - name: Build
        run: ./scripts/build.sh

      - name: Copy README into the package
        run: cp README.md packages/devtooie/README.md

      - name: Copy LICENSE into the package
        run: cp LICENSE packages/devtooie/LICENSE

      - name: Extract release notes
        run: ./scripts/change-log-entry.sh > /tmp/release-notes.md

      - name: Create GitHub release
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file /tmp/release-notes.md \
            --target "${{ github.sha }}"

      - name: Publish to npm
        working-directory: packages/devtooie
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
