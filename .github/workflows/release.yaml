name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Determines the version to release from the top `## X.Y.Z` heading in
  # CHANGELOG.md, and whether a GitHub release for it already exists. The
  # `publish` job only runs when it doesn't — this makes pushes to `main` that
  # don't add a new CHANGELOG heading a no-op, and makes re-runs idempotent.
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      exists: ${{ steps.check.outputs.exists }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Determine version from CHANGELOG.md
        id: version
        run: |
          version=$(grep -m1 -oE '^## [0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | sed -E 's/^## //')
          if [ -z "$version" ]; then
            echo "No '## X.Y.Z' heading found at the top of CHANGELOG.md" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.version.outputs.version }} already exists — nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      SKIP_SIMPLE_GIT_HOOKS: 1
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.tool-versions'

      - run: pnpm install --frozen-lockfile

      - name: Set package version from CHANGELOG
        working-directory: packages/devtooie
        run: npm version "$VERSION" --no-git-tag-version

      - name: Build
        run: pnpm build

      # README.md lives in packages/devtooie/ (published directly); only LICENSE is
      # copied in from the repo root.
      - name: Copy LICENSE into the package
        run: cp LICENSE packages/devtooie/LICENSE

      - name: Extract release notes
        run: ./scripts/change-log-entry.sh > /tmp/release-notes.md

      - name: Create GitHub release
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file /tmp/release-notes.md \
            --target "${{ github.sha }}"

      # The npm package needs the README inside packages/devtooie/, but the canonical README
      # lives at the repo ROOT so its relative docs/ links resolve when it's viewed from the
      # repo root on GitHub. Copy it in, then rewrite its relative docs/*.md links to absolute
      # URLs pinned to the just-created "$VERSION" tag: npm renders relative README links
      # against the repo root (ignoring repository.directory), so they'd 404 on npmjs.com
      # otherwise. Runner checkout only — the committed root README stays relative. The
      # docs/*.md files link to each other relatively and npm never renders them.
      - name: Copy README into the package and version-pin its doc links
        run: |
          cp README.md packages/devtooie/README.md
          sed -i -E \
            -e "s#\]\(docs/#](https://github.com/rhyek/devtooie/blob/$VERSION/docs/#g" \
            -e "s#\]\(packages/devtooie/docs/#](https://github.com/rhyek/devtooie/blob/$VERSION/packages/devtooie/docs/#g" \
            packages/devtooie/README.md

      # Tokenless publish via npm Trusted Publishing (OIDC): no NPM_TOKEN secret.
      # Requires npm >= 11.5.1, the id-token: write permission above, and a Trusted
      # Publisher configured for this package on npmjs.com (GitHub Actions →
      # rhyek/devtooie → release.yaml). Provenance is generated automatically.
      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        # Pin to the 11.x line rather than @latest: newer npm majors (12+) require a newer
        # Node than the one pinned in .tool-versions, so `npm@latest` fails with EBADENGINE
        # on the runner. Every 11.x runs on Node >=22.9 and is already >= 11.5.1.
        run: npm install -g npm@11

      - name: Publish to npm
        working-directory: packages/devtooie
        run: npm publish --provenance --access public
